<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Cumpleaños Nua</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

#startButton{
font-size:40px;
padding:20px 40px;
background:#ff4081;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:40vh;
}

#instruction{
position:absolute;
bottom:30px;
width:100%;
font-size:20px;
opacity:0;
}

#cakeCanvas{
position:absolute;
top:0;
left:0;
}

</style>
  
</head>

<body>

<button id="startButton">Aprieta aquí</button>

<div id="instruction">
Presiona la tecla espacio para encender las velas
</div>

<canvas id="cakeCanvas"></canvas>

<script>

let started=false;

document.getElementById("startButton").onclick=function(){

started=true;

document.getElementById("startButton").style.display="none";

document.getElementById("instruction").style.opacity=1;

}

 
  const canvas = document.getElementById("cakeCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  //kake-pososjon
  const cake = {
    x: canvas.width/2,
    y: canvas.height*0.65, //litt lavere inn midten
    width: 300,
    height: 200,
    color: "#fff",
    borderColor: "#ff99cc"
  }

  //lys
  const candles = [];
  const candleCount = 17;

  for(let i=0;i<candleCount;i++){
    candles.push({
      x: cake.x - cake.width/2 + (i+0.5)*(cake.width/candleCount),
      y: cake.y - cake.height - 20,
      width:10,
      height:20,
      lit:false
    });
  }

  //funksjon for å tegne kaken
  function drawCake(){
 // nederste kake
ctx.fillStyle = cake.color;
ctx.strokeStyle = cake.borderColor;
ctx.lineWidth = 4;

ctx.fillRect(
cake.x - cake.width/2,
cake.y - cake.height,
cake.width,
cake.height
);

ctx.strokeRect(
cake.x - cake.width/2,
cake.y - cake.height,
cake.width,
cake.height
);


// øverste kake-etasje
const topWidth = cake.width * 0.6;
const topHeight = cake.height * 0.6;

ctx.fillStyle = cake.color;

ctx.fillRect(
cake.x - topWidth/2,
cake.y - cake.height - topHeight + 10,
topWidth,
topHeight
);

ctx.strokeRect(
cake.x - topWidth/2,
cake.y - cake.height - topHeight + 10,
topWidth,
topHeight
);


// rosa frosting dekorasjon
ctx.fillStyle = "#ffb6d9";

for(let i=0;i<12;i++){

ctx.beginPath();

ctx.arc(
cake.x - cake.width/2 + i*(cake.width/11),
cake.y - cake.height,
8,
0,
Math.PI
);

ctx.fill();

}


// tulipaner
for(let i=0;i<6;i++){

let x = cake.x - topWidth/2 + (i+1)*(topWidth/7);
let y = cake.y - cake.height - topHeight + 10;

ctx.fillStyle="#ff66b2";

ctx.beginPath();
ctx.arc(x,y,8,0,Math.PI*2);
ctx.fill();

// blader
ctx.strokeStyle="#4CAF50";

ctx.beginPath();
ctx.moveTo(x,y+8);
ctx.lineTo(x,y+18);
ctx.stroke();

}


// lys
candles.forEach(c=>{

ctx.fillStyle = "#ffffff";

ctx.fillRect(
c.x-c.width/2,
c.y-c.height,
c.width,
c.height
);

if(c.lit){

ctx.fillStyle="orange";

ctx.beginPath();
ctx.arc(c.x,c.y-c.height-5,5,0,Math.PI*2);
ctx.fill();

}

});

}
  drawCake();
  </script>



  

</body>
</html>
