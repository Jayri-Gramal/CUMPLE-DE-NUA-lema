<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cumple Nua</title>

<style>

body{
background:#111;
color:white;
margin:0;
overflow:hidden;
font-family:sans-serif;
text-align:center;
}

button{
font-size:40px;
padding:20px 40px;
background:#ff4081;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:40vh;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<button id="start">Aprieta aquí</button>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let started=false

const cake={
x:canvas.width/2,
y:canvas.height*0.8,
width:300,
height:200
}

document.getElementById("start").onclick=()=>{
started=true
document.getElementById("start").style.display="none"
}

function drawCake(){

ctx.fillStyle="white"
ctx.fillRect(cake.x-cake.width/2,cake.y-cake.height,cake.width,cake.height)

ctx.strokeStyle="pink"
ctx.lineWidth=4
ctx.strokeRect(cake.x-cake.width/2,cake.y-cake.height,cake.width,cake.height)

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(started){
drawCake()
}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
