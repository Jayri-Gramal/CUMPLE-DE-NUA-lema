<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Cumpleaños Nua</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

#startButton{
font-size:40px;
padding:20px 40px;
background:#ff4081;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:40vh;
}

#instruction{
position:absolute;
bottom:30px;
width:100%;
font-size:20px;
opacity:0;
}

#cakeCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
  
</head>

<body>

<button id="startButton">Aprieta aquí</button>

<div id="instruction">
Presiona la tecla espacio para encender las velas
</div>

<canvas id="cakeCanvas"></canvas>

<script>

let started=false;
let finished=false;

const canvas = document.getElementById("cakeCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

document.getElementById("startButton").onclick=function(){

started=true;

document.getElementById("startButton").style.display="none";

document.getElementById("instruction").style.opacity=1;

drawScene();

}

//kake posisjon
const cake = {
x: canvas.width/2,
y: canvas.height*0.90,
width:600,
height:150,
color:"#ffb6c1",
borderColor:"#ff99cc"
}

//lys
const candles=[];
const candleCount=17;

for(let i=0;i<candleCount;i++){
candles.push({
x:cake.x - cake.width/2 + (i+0.5)*(cake.width/candleCount),
y:cake.y - cake.height - 20,
width:10,
height:20,
lit:false
});
}

let currentCandle=0;

const messages=[

"✨ Un deseo un felis dia Nua",
"🌸 Que tengas un día hermoso",
"🎉 Hoy celebramos a Nua",
"💖 Que la felicidad te acompañe",
"🌷 Un año más increíble",
"🎈 espero que sonrías mucho hoy",
"💫 Que todos tus sueños y metas se cumplan",
"🌟 Eres muy especial",
"🎂 Disfruta cada momento",
"💗 Te mereces lo mejor",
"🎊 Celebra con alegría",
"🌺 Un día mágico para ti",
"🎁 Muchas sorpresas hoy",
"🌈 Que tu vida sea colorida",
"💞 Rodeada de amor",
"🎉 Momentos inolvidables",
"✨ Felicidades Nua"

];

document.addEventListener("keydown",function(e){

if(!started) return;

if(e.code==="Space" && currentCandle < candles.length){

candles[currentCandle].lit=true;

drawScene();

showMessage(messages[currentCandle]);

spawnBalloons();

spawnConfetti();

currentCandle++;

}

else if(e.code==="Space" && currentCandle===candles.length && !finished){

finished=true;

finalCelebration();

}

});

function finalCelebration(){

blowOutCandles();

startHeartFireworks();

for(let i=0;i<30;i++){
spawnBalloons();
}

showPhotos();

}

function startHeartFireworks(){

setInterval(()=>{

for(let i=0;i<20;i++){

let p=document.createElement("div");

p.innerHTML="💖";

p.style.position="absolute";

p.style.left=(window.innerWidth/2)+"px";
p.style.top=(window.innerHeight/2)+"px";

p.style.fontSize="20px";

p.style.transition="all 2s ease-out";

document.body.appendChild(p);

let angle=Math.random()*Math.PI*2;
let distance=200+Math.random()*200;

let x=Math.cos(angle)*distance;
let y=Math.sin(angle)*distance;

setTimeout(()=>{
p.style.transform=`translate(${x}px,${y}px)`;
},50);

setTimeout(()=>{
p.remove();
},2000);

}

},800);

}

function showPhotos(){

const photos=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];

photos.forEach((src)=>{

let img=document.createElement("img");

img.src=src;

img.style.position="absolute";
img.style.width="200px";

img.style.left=Math.random()*window.innerWidth+"px";

img.style.bottom="-200px";

img.style.transition="bottom 8s linear";

document.body.appendChild(img);

setTimeout(()=>{
img.style.bottom="120%";
},100);

});

}

function blowOutCandles(){

candles.forEach(c=>{
c.lit=false;
});

drawScene();

}

function drawScene(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawCake();

}

function showMessage(text){

const msg=document.createElement("div");

msg.innerText=text;

msg.style.position="absolute";
msg.style.left="50%";
msg.style.top="90%";
msg.style.transform="translate(-50%,0)";

msg.style.fontSize="40px";
msg.style.color="white";
msg.style.fontWeight="bold";

msg.style.transition="top 3s";

document.body.appendChild(msg);

setTimeout(()=>{
msg.style.top="20%";
},50);

setTimeout(()=>{
msg.remove();
},6000);

}

function spawnBalloons(){

for(let i=0;i<12;i++){

let b=document.createElement("div");

b.style.position="absolute";

b.style.width="25px";
b.style.height="35px";

b.style.borderRadius="50%";

b.style.background=`hsl(${Math.random()*360},70%,60%)`;

b.style.left=Math.random()*window.innerWidth+"px";

b.style.bottom="0px";

b.style.transition="bottom 6s linear";

document.body.appendChild(b);

setTimeout(()=>{
b.style.bottom="120%";
},50);

setTimeout(()=>{
b.remove();
},6000);

}

}

function spawnConfetti(){

for(let i=0;i<50;i++){

let c=document.createElement("div");

c.style.position="absolute";

c.style.width="6px";
c.style.height="6px";

c.style.background=`hsl(${Math.random()*360},80%,60%)`;

c.style.left=Math.random()*window.innerWidth+"px";

c.style.top="0px";

c.style.transition="top 4s linear";

document.body.appendChild(c);

setTimeout(()=>{
c.style.top="100%";
},50);

setTimeout(()=>{
c.remove();
},4000);

}

}

function drawCream(x, y, width){

// HVIT krem topp
ctx.fillStyle="white";
ctx.fillRect(x - width/2, y, width, 25);

// STORE drypp (runde og lange)
for(let i=0;i<width/40;i++){

let dripX = x - width/2 + i*40;
let dripLength = 20 + (i%2)*15; // varierer høyde

// rund topp (ser mer ekte ut)
ctx.beginPath();
ctx.arc(dripX+10, y+25, 10, 0, Math.PI);
ctx.fill();

// selve dryppet
ctx.fillRect(dripX, y+25, 20, dripLength);
}

// STRØSSEL på toppen (på hvit krem)
const colors=["red","blue","yellow","green","purple"];

for(let i=0;i<50;i++){
ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];

ctx.beginPath();
ctx.arc(
x - width/2 + Math.random()*width,
y + Math.random()*20,
3,
0,
Math.PI*2
);
ctx.fill();
}

}
  
function drawCake(){

    ctx.fillStyle=cake.color;
    ctx.strokeStyle=cake.borderColor;
    ctx.lineWidth=4;

    // nederste etasje
    ctx.fillRect(
        cake.x-cake.width/2,
        cake.y-cake.height,
        cake.width,
        cake.height
    );

    ctx.strokeRect(
        cake.x-cake.width/2,
        cake.y-cake.height,
        cake.width,
        cake.height
    );

    // krem nederst
    drawCream(
        cake.x,
        cake.y - cake.height,
        cake.width
    );

    // legg til tulipaner på nederste etasje
    ctx.font = "30px serif"; // størrelsen på emoji
    ctx.textAlign = "center"; // sentrerer emojien på x
    ctx.textBaseline = "bottom"; // bunnen av kaken

    const tulipCount = 6; 
    const startX = cake.x - cake.width / 2 + cake.width / (tulipCount * 2);
    const stepX = cake.width / tulipCount;
    const y = cake.y; // bunnen av nederste etasje

    for(let i = 0; i < tulipCount; i++){
        let x = startX + i * stepX;
        ctx.fillText("🌷", x, y);
    }

    // midterste etasje
    const topWidth=cake.width*0.6;
    const topHeight=cake.height*0.6;

    ctx.fillRect(
        cake.x-topWidth/2,
        cake.y-cake.height-topHeight,
        topWidth,
        topHeight
    );

    ctx.strokeRect(
        cake.x-topWidth/2,
        cake.y-cake.height-topHeight,
        topWidth,
        topHeight
    );

    // krem midt
    drawCream(
        cake.x,
        cake.y - cake.height - topHeight,
        topWidth
    );

    // øverste etasje
    const top2Width=cake.width*0.35;
    const top2Height=cake.height*0.5;

    ctx.fillRect(
        cake.x-top2Width/2,
        cake.y-cake.height-topHeight-top2Height,
        top2Width,
        top2Height
    );

    ctx.strokeRect(
        cake.x-top2Width/2,
        cake.y-cake.height-topHeight-top2Height,
        top2Width,
        top2Height
    );

    // krem topp
    drawCream(
        cake.x,
        cake.y - cake.height - topHeight - top2Height,
        top2Width
    );

    // jordbær på toppen
    for(let i=0;i<5;i++){

        let x = cake.x - 80 + i*40;
        let y = cake.y - cake.height - topHeight - top2Height - 10;

        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle="green";
        ctx.beginPath();
        ctx.arc(x, y-6, 5, 0, Math.PI);
        ctx.fill();
    }

    // lys
    candles.forEach(c=>{

        ctx.fillStyle="#40E0D0";

        ctx.fillRect(
            c.x-c.width/2,
            c.y-c.height,
            c.width,
            c.height
        );

        if(c.lit){
            ctx.fillStyle="orange";

            ctx.beginPath();
            ctx.arc(c.x,c.y-c.height-5,5,0,Math.PI*2);
            ctx.fill();
        }

    });
}


</script>
</body>
</html>
