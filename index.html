<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Cumpleaños Nua</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

#startButton{
font-size:40px;
padding:20px 40px;
background:#ff4081;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:40vh;
}

#instruction{
position:absolute;
bottom:30px;
width:100%;
font-size:20px;
opacity:0;
}

#cakeCanvas{
position:absolute;
top:0;
left:0;
}

</style>
  
</head>

<body>

<button id="startButton">Aprieta aquí</button>

<div id="instruction">
Presiona la tecla espacio para encender las velas
</div>

<canvas id="cakeCanvas"></canvas>

<script>

let started=false;

document.getElementById("startButton").onclick=function(){

started=true;

document.getElementById("startButton").style.display="none";

document.getElementById("instruction").style.opacity=1;

}

 
  const canvas = document.getElementById("cakeCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  //kake-pososjon
  const cake = {
    x: canvas.width/2,
    y: canvas.height*0.65, //litt lavere inn midten
    width: 300,
    height: 200,
    color: "#fff",
    borderColor: "#ff99cc"
  }

  //lys
  const candles = [];
  const candleCount = 17;

  for(let i=0;i<candleCount;i++){
    candles.push({
      x: cake.x - cake.width/2 + (i+0.5)*(cake.width/candleCount),
      y: cake.y - cake.height - 20,
      width:10,
      height:20,
      lit:false
    });
  }

  //funksjon for å tegne kaken
  function drawCake(){
  //kake bunn
  ctx.fillStyle = cake.color;
  ctx.strokeStyle = cake.borderColor;
  ctx.lineWidth = 4;
  ctx.fillRect(cake.x - cake.width/2, cake.y - cake.height, cake.width, cake.height);
  ctx.strokeRect(cake.x - cake.width/2, cake.y - cake.height, cake.width, cake.height);

  //tegn tulipaner (enkelt)
  for(let i=0;i<5;i++){
    ctx.fillStyle="#ff66b2";
    ctx.beginPath();
    ctx.arc(cake.x - cake.width/2 + (i+1)*(cake.width/6), cake.y - cake.height - 10, 10, 0, Math.PI*2);
    ctx.fill();
  }

  // tegn lys
  candles.forEach(c=>{
    ctx.fillStyle = c.lit ? "yellow":"#ccc";
    ctx.fillRect(c.x-c.width/2, c.y-c.height, c.width, c.height);
  });
  }
  drawCake();
  </script>



  

</body>
</html>
