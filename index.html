<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cumpleaños Nua</title>

<style>
body{
   background-image: url("back.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family:sans-serif;
  margin:0;
  overflow:hidden;
  text-align:center;

  color:blue;
  font-family:sans-serif;
  margin:0;
  overflow:hidden;
  text-align:center;
}

#startButton{
  font-size:40px;
  padding:20px 40px;
  background:#ff4081;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  margin-top:40vh;
}

#instruction{
  position:absolute;
  bottom:30px;
  width:100%;
  font-size:20px;
  opacity:0;
}

#cakeCanvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index: 1;
  
}
#bg-layer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index: 0;
}
#fg-layer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index: 10;
}
</style>
</head>

<body>

<button id="startButton">Aprieta aquí</button>

<div id="instruction">
Presiona la tecla espacio para encender las velas
</div>

<canvas id="cakeCanvas"></canvas>
  <div class="bg-layer" id="bgLayer"></div>
<div class="fg-layer" id="fgLayer"></div>

<script>
let started=false;
let finished=false;

const canvas = document.getElementById("cakeCanvas");
const ctx = canvas.getContext("2d");

const stitchImg = new Image();
stitchImg.src = "Stitch.png";

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// kake posisjon
const cakeScale = 1.0; // 1 = normal, 1.5 = stor, 2 = veldig stor
  const cake = {
  x: canvas.width/2,
  y: canvas.height*0.0,
  width:600,
  height:150,
  color:"#ffb6c1",
  borderColor:"#ff99cc"
}

// lys
const candles=[];

let currentCandle=0;

const messages=[
  "✨ Un deseo un felis dia Nua",
  "🌸 Que tengas un día hermoso",
  "🎉 Hoy celebramos a Nua",
  "💖 Que la felicidad te acompañe",
  "🌷 Un año más increíble",
  "🎈 espero que sonrías mucho hoy",
  "💫 Que todos tus sueños y metas se cumplan",
  "🌟 Eres muy especial",
  "🎂 Disfruta cada momento",
  "💗 Te mereces lo mejor",
  "🎊 Celebra con alegría",
  "🌺 Un día mágico para ti",
  "🎁 Muchas sorpresas hoy",
  "🌈 Que tu vida sea colorida",
  "💞 Rodeada de amor",
  "🎉 Momentos inolvidables",
  "✨ Ahora pide un deseo y sopla las velas(sopla de verdad jaja)"
];

// --------------------
// FUNKSJON: SETUP LYS
// --------------------
function setupCandles(){
  candles.length = 0;

  // NEDERSTE ETASJE - 9 lys
  const bottomCount = 9;
  const bottomY = cake.y - cake.height;
  for(let i=0;i<bottomCount;i++){
    candles.push({
      x: cake.x - cake.width/2 + (i+0.5)*(cake.width/bottomCount),
      y: bottomY,
      width:15,
      height:35,
      lit:false
    });
  }

  // MIDTERSTE ETASJE - 5 lys
  const midWidth = cake.width*0.6;
  const midHeight = cake.height*0.6;
  const midCount = 5;
  const midY = cake.y - cake.height - midHeight;
  for(let i=0;i<midCount;i++){
    candles.push({
      x: cake.x - midWidth/2 + (i+0.5)*(midWidth/midCount),
      y: midY,
      width:15,
      height:35,
      lit:false
    });
  }

  // ØVERSTE ETASJE - 3 lys
  const top2Width = cake.width*0.35;
  const top2Height = cake.height*0.5;
  const topCount = 3;
  const topY = cake.y - cake.height - midHeight - top2Height;
  for(let i=0;i<topCount;i++){
    candles.push({
      x: cake.x - top2Width/2 + (i+0.5)*(top2Width/topCount),
      y: topY,
      width:15,
      height:35,
      lit:false
    });
  }
}

// --------------------
// KNAPP START
// --------------------
document.getElementById("startButton").onclick=function(){
  started=true;
  document.getElementById("startButton").style.display="none";
  document.getElementById("instruction").style.opacity=1;

  setupCandles();
  drawScene();

  startBlowDetection(); // 👈 HER la du den inn
}

// --------------------
// KEYDOWN
// --------------------
document.addEventListener("keydown",function(e){
  if(!started) return;

  if(e.code==="Space" && currentCandle < candles.length){
    candles[currentCandle].lit=true;
    drawScene();
    showMessage(messages[currentCandle]);
    spawnBalloons();
    spawnConfetti();
    currentCandle++;
  }
  else if(e.code==="Space" && currentCandle===candles.length && !finished){
    finished=true;
    finalCelebration();
  }
});

// --------------------
// FUNKSJONER: FEIRING, BALLONGER, KONFETTI, MELLOM
// --------------------
function finalCelebration(){
  blowOutCandles();
  startHeartFireworks();
  for(let i=0;i<30;i++){
    spawnBalloons();
  }
  showPhotos();
}

function startHeartFireworks(){
  setInterval(()=>{
    for(let i=0;i<20;i++){
      let p=document.createElement("div");
      p.innerHTML="💖ㅤㅤㅤㅤ🌷ㅤㅤㅤㅤ✨";
      p.style.position="absolute";
      p.style.zIndex = "0";
      p.style.left=(window.innerWidth/2.7)+"px";
      p.style.top=(window.innerHeight*0.7)+"90px";
      p.style.fontSize="40px";
      p.style.transition="all 4s ease-out";
      document.getElementById("bgLayer").appendChild(p)
      let angle=Math.random()*Math.PI*2;
      let distance=700+Math.random()*700;
      let x=Math.cos(angle)*distance;
      let y=Math.sin(angle)*distance;

      setTimeout(()=>{
        p.style.transform=`translate(${x}px,${y}px)`;
      },200);

      setTimeout(()=>{ p.remove(); },4000);
    }
  },800);
}

function showPhotos(){

  const photos = [
    "hart.png","1.png","2.png","3.png","4.png","5.png",
    "6.png","7.png","8.png","9.png","10.png","11.png",
    "12.png","13.png","14.png","15.png","16.png","17.png",
    "18.png","19.png","20.png","21.png"
  ];

  let index = 0;

  function spawnRow(){

    // stopp når alle er vist
    if(index >= photos.length) return;

    for(let i=0; i<3; i++){

      if(index >= photos.length) break;

      let img = document.createElement("img");
      img.src = photos[index];

      img.style.position = "absolute";
      img.style.width = "180px";

      // 🔥 RANDOM STARTPOSISJON (men ikke helt ute av skjermen)
      let startX = Math.random() * (window.innerWidth - 200);
      img.style.left = startX + "px";

      // starter under skjermen
      img.style.bottom = "-200px";

      // 🔥 SAKTERE BEVEGELSE
      img.style.transition = "bottom 10s linear";

      document.body.appendChild(img);

      // fly opp
      setTimeout(()=>{
        img.style.bottom = "110%";
      }, 100);

      // fjern etterpå
      setTimeout(()=>{
        img.remove();
      }, 10000);

      index++;
    }

    // 🔁 ny rad etter litt tid
    setTimeout(spawnRow, 5000);
  }

  spawnRow();
}

   

  function spawnSmoke(x, y){

  for(let i=0;i<8;i++){

    let s = document.createElement("div");

    s.style.position = "absolute";
    s.style.zIndex = "10";
    s.style.width = "10px";
    s.style.height = "10px";
    s.style.borderRadius = "50%";
    s.style.background = "rgba(200,200,200,0.7)";
    let scaledX = (x - canvas.width/2) * cakeScale + canvas.width/2;
let scaledY = (y - canvas.height*0.6) * cakeScale + canvas.height*0.6;

s.style.left = scaledX + "px";
s.style.top = scaledY + "px";
    s.style.transition = "all 2s ease-out";

    document.getElementById("fgLayer").appendChild(s);

    let offsetX = (Math.random() - 0.5) * 40;
    let offsetY = -50 - Math.random() * 50;

    setTimeout(() => {
      s.style.transform = `translate(${offsetX}px,${offsetY}px) scale(2)`;
      s.style.opacity = "0";
    }, 50);

    setTimeout(() => {
      s.remove();
    }, 2000);
  }
}
function blowOutCandles(){

  // 1. skru av lys
  candles.forEach(c=>{
    c.lit = false;
  });

  // 2. tegn kaken først
  drawScene();

  // 3. så lag røyk OPPÅ
  candles.forEach(c=>{
    spawnSmoke(c.x, c.y - c.height);
  });

}
function drawScene(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(canvas.width/2, canvas.height*0.6);
  ctx.scale(cakeScale, cakeScale);
  ctx.translate(-canvas.width/2, -canvas.height*0.6);

  drawCake();

  ctx.restore();
}

function showMessage(text){
  const msg=document.createElement("div");
  msg.innerText=text;
  msg.style.position="absolute";
  msg.style.left="50%";
  msg.style.top="90%";
  msg.style.transform="translate(-50%,0)";
  msg.style.fontSize="40px";
  msg.style.color="white";
  msg.style.fontWeight="bold";
  msg.style.transition="top 3s";
  document.body.appendChild(msg);
  setTimeout(()=>{ msg.style.top="20%"; },50);
  setTimeout(()=>{ msg.remove(); },6000);
}

function spawnBalloons(){
  for(let i=0;i<12;i++){

    setTimeout(()=>{

      let b=document.createElement("div");

      b.style.position="absolute";
      b.style.width="25px";
      b.style.height="35px";
      b.style.borderRadius="50%";
      b.style.background=`hsl(${Math.random()*360},70%,60%)`;

      // starter fra bunnen
      b.style.left=Math.random()*window.innerWidth+"px";
      b.style.bottom="0px";
      b.style.transition="bottom 6s linear";

      // SNOR
      let string=document.createElement("div");
      string.style.position="absolute";
      string.style.width="2px";
      string.style.height="30px";
      string.style.background="white";
      string.style.left="50%";
      string.style.top="100%";
      string.style.transform="translateX(-50%)";

      b.appendChild(string);
      document.getElementById("bgLayer").appendChild(b)
      // fly opp
      setTimeout(()=>{
        b.style.bottom="120%";
      },50);

      // fjern
      setTimeout(()=>{
        b.remove();
      },6000);

    }, Math.random()*5000); // tilfeldig starttid

  }
}


function spawnConfetti(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.style.position="absolute";
    c.style.width="6px";
    c.style.height="6px";
    c.style.background=`hsl(${Math.random()*360},80%,60%)`;
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.top="0px";
    c.style.transition="top 4s linear";
    document.body.appendChild(c);
    setTimeout(()=>{ c.style.top="100%"; },50);
    setTimeout(()=>{ c.remove(); },4000);
  }
}

function drawCream(x, y, width){
  ctx.fillStyle="white";
  ctx.fillRect(x - width/2, y, width, 25);

  for(let i=0;i<width/40;i++){

    let dripX = x - width/2 + i*40;

    // STOPPER hvis den går utenfor høyre kant
    if(dripX + 20 > x + width/2) break;

    let dripLength = 20 + (i%2)*15;

    ctx.beginPath();
    ctx.arc(dripX+10, y+25, 10, 0, Math.PI);
    ctx.fill();

    ctx.fillRect(dripX, y+25, 20, dripLength);
  }



  const colors=["red","blue","yellow","green","purple"];
  for(let i=0;i<50;i++){
    ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
    ctx.beginPath();
    ctx.arc(
      x - width/2 + Math.random()*width,
      y + Math.random()*20,
      3,
      0,
      Math.PI*2
    );
    ctx.fill();
  }
}

// --------------------
// DRAW CAKE
// --------------------
function drawCake(){
  ctx.fillStyle=cake.color;
  ctx.strokeStyle=cake.borderColor;
  ctx.lineWidth=4;
       

  // nederste etasje
  ctx.fillRect(cake.x-cake.width/2, cake.y-cake.height, cake.width, cake.height);
  ctx.strokeRect(cake.x-cake.width/2, cake.y-cake.height, cake.width, cake.height);
  drawCream(cake.x, cake.y - cake.height, cake.width);

  // tulipaner nederst
  ctx.font="30px serif";
  ctx.textAlign="center";
  ctx.textBaseline="top";
  const tulipCount = 6;
  const startX = cake.x - cake.width/2 + cake.width/(tulipCount*2);
  const stepX = cake.width/tulipCount;
  const y = cake.y - 60;
  for(let i=0;i<tulipCount;i++){
    let x = startX + i*stepX;
    ctx.fillText("🌷", x, y);
  }

  // midterste etasje
  ctx.fillStyle = cake.color;
  const topWidth=cake.width*0.6;
  const topHeight=cake.height*0.6;
  ctx.fillRect(cake.x-topWidth/2, cake.y-cake.height-topHeight, topWidth, topHeight);
  ctx.strokeRect(cake.x-topWidth/2, cake.y-cake.height-topHeight, topWidth, topHeight);
  drawCream(cake.x, cake.y - cake.height - topHeight, topWidth);
  

  // øverste etasje
  ctx.fillStyle = cake.color;
  const top2Width=cake.width*0.35;
  const top2Height=cake.height*0.5;
  ctx.fillRect(cake.x-top2Width/2, cake.y-cake.height-topHeight-top2Height, top2Width, top2Height);
  ctx.strokeRect(cake.x-top2Width/2, cake.y-cake.height-topHeight-top2Height, top2Width, top2Height);
  drawCream(cake.x, cake.y - cake.height - topHeight - top2Height, top2Width);
  

  // jordbær
  for(let i=0;i<5;i++){
    let x = cake.x - 80 + i*40;
    let y = cake.y - cake.height - topHeight - top2Height - 10;
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle="green";
    ctx.beginPath();
    ctx.arc(x, y-6, 5, 0, Math.PI);
    ctx.fill();
  }

  // STITCH PÅ TOPPEN
ctx.drawImage(
  stitchImg,
  cake.x - 115,
  cake.y - cake.height - 371,
  250,
  250
);
  // lys
  candles.forEach(c=>{
    ctx.fillStyle="#40E0D0";
    ctx.fillRect(c.x-c.width/2, c.y-c.height, c.width, c.height);
    if(c.lit){
    ctx.font = "20px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    

    ctx.fillText("🔥", c.x, c.y - c.height - 10);
}
  });
}


  async function startBlowDetection(){

  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    mic.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    function checkVolume(){
      analyser.getByteTimeDomainData(data);

      let sum = 0;
      for(let i=0;i<data.length;i++){
        let val = (data[i] - 128) / 128;
        sum += val * val;
      }

      let volume = Math.sqrt(sum / data.length);

      // 🔥 JUSTER DENNE VERDIEN
      if(volume > 0.15 && !finished){
        finished = true;
        finalCelebration();
      }

      requestAnimationFrame(checkVolume);
    }

    checkVolume();

  }catch(err){
    console.log("Mikrofon funker ikke:", err);
  }
}
</script>
</body>
</html>
